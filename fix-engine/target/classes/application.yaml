spring:
  application:
    name: fix-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fixengine}
    username: ${DB_USER:fixuser}
    password: ${DB_PASS:fixpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# ── Node Identity ──────────────────────────────────────────────────────────
fix:
  node:
    id: ${NODE_ID:node-1}
    host: ${NODE_HOST:localhost}
    port: ${SERVER_PORT:8080}

  # ── Cluster / ZooKeeper ────────────────────────────────────────────────
  cluster:
    zookeeper:
      connect-string: ${ZK_CONNECT:localhost:2181}
      session-timeout-ms: 5000
      connection-timeout-ms: 3000
      leader-path: /fix-engine/leader
      retry-base-sleep-ms: 1000
      retry-max-attempts: 3

  # ── Hazelcast ─────────────────────────────────────────────────────────
  hazelcast:
    cluster-name: fix-engine-cluster
    members:
      - ${HZ_NODE1:10.0.1.10}
      - ${HZ_NODE2:10.0.1.11}
      - ${HZ_NODE3:10.0.1.12}
    port: 5701

  # ── FIX Sessions ──────────────────────────────────────────────────────
  sessions:
    - session-id: SESSION-001
      begin-string: FIX.4.4
      sender-comp-id: MY_FIRM
      target-comp-id: BROKER_A
      mode: INITIATOR
      host: 192.168.10.50
      port: 9876
      heartbeat-interval: 30
      reconnect-interval: 10
      reset-on-logon: false
      reset-on-logout: false
      reset-on-disconnect: false
      enabled: true

    - session-id: SESSION-002
      begin-string: FIX.4.4
      sender-comp-id: MY_FIRM
      target-comp-id: BROKER_B
      mode: ACCEPTOR
      port: 9877
      heartbeat-interval: 30
      reconnect-interval: 10
      reset-on-logon: false
      reset-on-logout: false
      reset-on-disconnect: false
      enabled: true

    - session-id: SESSION-003
      begin-string: FIX.4.2
      sender-comp-id: MY_FIRM
      target-comp-id: EXCHANGE_C
      mode: INITIATOR
      host: 10.20.30.40
      port: 5001
      heartbeat-interval: 20
      reconnect-interval: 5
      reset-on-logon: false
      reset-on-logout: false
      reset-on-disconnect: false
      enabled: true

# ── JWT Security ───────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-256bit-key-minimum}
  expiration-ms: 86400000  # 24 hours

# ── Actuator / Monitoring ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  level:
    com.fixengine: DEBUG
    quickfix: INFO
    org.springframework: INFO
    com.hazelcast: WARN
    org.apache.curator: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{nodeId}] %logger{36} - %msg%n"
  file:
    name: logs/fix-engine.log
