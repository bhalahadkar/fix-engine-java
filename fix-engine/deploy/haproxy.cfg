global
    log /dev/log local0
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 50000

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 503 /etc/haproxy/errors/503.http

# ── GUI / REST API Frontend ────────────────────────────────────────────────
frontend fix_gui_http
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

frontend fix_gui_https
    bind *:443 ssl crt /etc/ssl/private/fix-engine.pem
    default_backend fix_api_nodes

    # WebSocket support
    acl is_websocket hdr(Upgrade) -i websocket
    use_backend fix_ws_nodes if is_websocket

# ── REST API Backend ───────────────────────────────────────────────────────
backend fix_api_nodes
    balance roundrobin
    option httpchk GET /actuator/health
    http-check expect status 200

    server node1 10.0.1.10:8080 check inter 2s fall 2 rise 2 weight 1
    server node2 10.0.1.11:8080 check inter 2s fall 2 rise 2 weight 1
    server node3 10.0.1.12:8080 check inter 2s fall 2 rise 2 weight 1

# ── WebSocket Backend ──────────────────────────────────────────────────────
backend fix_ws_nodes
    balance source
    timeout tunnel 3600s
    option http-server-close

    server node1 10.0.1.10:8080 check inter 2s fall 2 rise 2
    server node2 10.0.1.11:8080 check inter 2s fall 2 rise 2
    server node3 10.0.1.12:8080 check inter 2s fall 2 rise 2

# ── HAProxy Stats ──────────────────────────────────────────────────────────
listen stats
    bind *:8404
    stats enable
    stats uri /haproxy-stats
    stats refresh 10s
    stats auth admin:CHANGE_ME
